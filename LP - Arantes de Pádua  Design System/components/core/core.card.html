<!-- @dsCard group="Components" viewport="700x300" name="Core — buttons, badges, divider" subtitle="Button variants, eyebrow, badges, metallic divider" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--ivory); padding: 26px; }
  .grid { display: grid; grid-template-columns: 1fr; gap: 22px; }
  .row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .panel-dark { background: var(--surface-brand); border-radius: var(--r-md); padding: 18px 20px; box-shadow: var(--shadow-card-dark); }
  .lbl { font-family: var(--font-sans); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--text-faint); margin: 0 0 10px; }

  .btn { display:inline-flex; align-items:center; gap:10px; font-family:var(--font-sans); font-weight:600; text-transform:uppercase; border:1px solid transparent; border-radius:var(--r-sm); cursor:pointer; padding:15px 28px; font-size:13px; letter-spacing:.09em; }
  .btn-primary { background:var(--emerald-700); color:var(--ivory); box-shadow:var(--shadow-sm); }
  .btn-metal { background:var(--metal-grad); color:var(--ink-900); box-shadow:var(--shadow-xs); }
  .btn-outline { background:transparent; color:var(--emerald-700); border-color:var(--hairline-on-light-strong); }
  .btn-ghost { background:transparent; color:var(--emerald-700); }
  .btn-sm { padding:10px 18px; font-size:12px; }
  .btn-outline-d { background:transparent; color:var(--platinum-100); border-color:var(--hairline-on-dark-strong); }

  .badge { display:inline-flex; align-items:center; gap:7px; font-family:var(--font-sans); font-weight:500; font-size:11px; letter-spacing:.1em; text-transform:uppercase; padding:5px 12px; border-radius:var(--r-pill); border:1px solid; }
  .badge-neutral { background:var(--sand-100); color:var(--ink-600); border-color:var(--hairline-on-light); }
  .badge-emerald { background:var(--emerald-50); color:var(--emerald-600); border-color:rgba(19,75,60,.18); }
  .badge-metal { background:transparent; color:var(--platinum-700); border-color:var(--platinum-400); }

  .eyebrow { display:inline-flex; align-items:center; gap:14px; font-family:var(--font-sans); font-weight:500; font-size:var(--fs-eyebrow); letter-spacing:var(--tr-eyebrow); text-transform:uppercase; color:var(--emerald-600); }
  .eyebrow::before { content:""; width:30px; height:1px; background:var(--metal-grad-soft); }

  .divider { display:flex; align-items:center; gap:20px; }
  .divider .rule { height:1px; background:var(--metal-grad-soft); flex:1; }
  .divider .lab { font-family:var(--font-sans); font-weight:300; font-size:13px; letter-spacing:.3em; text-transform:uppercase; color:var(--text-muted); }
</style>
</head>
<body>
  <div class="grid">
    <div>
      <p class="lbl">Button — on light</p>
      <div class="row">
        <button class="btn btn-primary">Agendar diagnóstico</button>
        <button class="btn btn-metal">Conheça os cases</button>
        <button class="btn btn-outline">Áreas de atuação</button>
        <button class="btn btn-ghost">Saiba mais</button>
        <button class="btn btn-primary btn-sm">Enviar</button>
      </div>
    </div>
    <div class="panel-dark">
      <p class="lbl" style="color:var(--platinum-500)">Button — on emerald</p>
      <div class="row">
        <button class="btn btn-metal">Falar com a equipe</button>
        <button class="btn btn-outline-d">Áreas de atuação</button>
      </div>
    </div>
    <div class="row" style="gap:28px">
      <div><p class="lbl">Eyebrow</p><span class="eyebrow">Direito Empresarial</span></div>
      <div><p class="lbl">Badges</p>
        <div class="row">
          <span class="badge badge-neutral">Consultivo</span>
          <span class="badge badge-emerald">Contencioso</span>
          <span class="badge badge-metal">Premium</span>
        </div>
      </div>
    </div>
    <div>
      <p class="lbl">Metal divider</p>
      <div class="divider"><span class="rule"></span><span class="lab">Advogados</span><span class="rule"></span></div>
    </div>
  </div>
</body>
</html>
