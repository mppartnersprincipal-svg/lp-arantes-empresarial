<!-- @dsCard group="Components" viewport="700x320" name="Forms — fields" subtitle="Labelled input, textarea, focus state" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--ivory); padding: 28px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
  label.f { display: block; }
  .l { display:block; font-family:var(--font-sans); font-size:12px; font-weight:500; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-600); margin-bottom:8px; }
  .l span { color: var(--emerald-500); }
  .ctrl { width:100%; font-family:var(--font-body); font-size:var(--fs-body); color:var(--ink-900); background:var(--surface-paper); border:1px solid var(--hairline-on-light-strong); border-radius:var(--r-sm); padding:14px 16px; outline:none; }
  .ctrl.focus { border-color:var(--emerald-600); box-shadow:0 0 0 3px rgba(26,100,80,.12); }
  .ctrl::placeholder { color: var(--ink-300); }
  textarea.ctrl { resize: vertical; }
  .hint { display:block; font-family:var(--font-body); font-size:var(--fs-xs); color:var(--text-faint); margin-top:6px; }
  .full { grid-column: 1 / -1; }
</style>
</head>
<body>
  <div class="grid">
    <label class="f"><span class="l">Nome</span><input class="ctrl" placeholder="Seu nome completo"></label>
    <label class="f"><span class="l">E-mail <span>*</span></span><input class="ctrl focus" value="contato@empresa.com.br"></label>
    <label class="f full"><span class="l">Como podemos ajudar</span><textarea class="ctrl" rows="3" placeholder="Descreva brevemente sua demanda."></textarea><span class="hint">Sigilo garantido — sua mensagem é confidencial.</span></label>
  </div>
</body>
</html>
