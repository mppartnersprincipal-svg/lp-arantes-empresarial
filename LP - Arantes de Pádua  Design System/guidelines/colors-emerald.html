<!-- @dsCard group="Colors" viewport="700x180" name="Emerald scale" subtitle="Brand green — --emerald-700 is the logo field" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--ivory); padding: 22px; }
  .row { display: grid; grid-template-columns: repeat(11, 1fr); gap: 0; border-radius: var(--r-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sw { aspect-ratio: 1 / 1.15; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; }
  .sw span { font-family: var(--font-sans); font-size: 10px; letter-spacing: .04em; }
  .sw .hex { font-size: 9px; opacity: .75; }
  .lo { color: var(--ink-700); } .hi { color: var(--platinum-100); }
  .cap { font-family: var(--font-sans); font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--text-muted); margin: 0 0 12px; }
</style>
</head>
<body>
  <p class="cap">Emerald · primary</p>
  <div class="row">
    <div class="sw hi" style="background:#051712"><span>950</span><span class="hex">051712</span></div>
    <div class="sw hi" style="background:#07211b"><span>900</span><span class="hex">07211B</span></div>
    <div class="sw hi" style="background:#0b2c24"><span>800</span><span class="hex">0B2C24</span></div>
    <div class="sw hi" style="background:#0e332a"><span>700</span><span class="hex">0E332A</span></div>
    <div class="sw hi" style="background:#134b3c"><span>600</span><span class="hex">134B3C</span></div>
    <div class="sw hi" style="background:#1a6450"><span>500</span><span class="hex">1A6450</span></div>
    <div class="sw hi" style="background:#2e826a"><span>400</span><span class="hex">2E826A</span></div>
    <div class="sw lo" style="background:#57a48d"><span>300</span><span class="hex">57A48D</span></div>
    <div class="sw lo" style="background:#95c6b6"><span>200</span><span class="hex">95C6B6</span></div>
    <div class="sw lo" style="background:#cde4dc"><span>100</span><span class="hex">CDE4DC</span></div>
    <div class="sw lo" style="background:#ecf4f0"><span>50</span><span class="hex">ECF4F0</span></div>
  </div>
</body>
</html>
