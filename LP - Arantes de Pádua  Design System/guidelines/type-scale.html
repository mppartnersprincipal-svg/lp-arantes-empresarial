<!-- @dsCard group="Type" viewport="700x300" name="Type scale" subtitle="Display → H4, fluid clamp() sizes" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--ivory); padding: 24px 28px; }
  .meta { font-family: var(--font-sans); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--text-faint); margin: 0 0 16px; }
  .line { display: flex; align-items: baseline; gap: 18px; border-bottom: 1px solid var(--hairline-on-light); padding: 9px 0; }
  .line:last-child { border-bottom: 0; }
  .spec { font-family: var(--font-sans); font-size: 10px; letter-spacing: .06em; color: var(--text-faint); width: 130px; flex: none; text-transform: uppercase; }
  .samp { font-family: var(--font-display); font-weight: 600; color: var(--text-strong); letter-spacing: -.015em; line-height: 1; }
</style>
</head>
<body>
  <p class="meta">Type scale · Cormorant Garamond</p>
  <div class="line"><span class="spec">Display · 56–96</span><span class="samp" style="font-size:46px">Crescer com segurança</span></div>
  <div class="line"><span class="spec">H1 · 44–68</span><span class="samp" style="font-size:36px">Direito empresarial</span></div>
  <div class="line"><span class="spec">H2 · 34–48</span><span class="samp" style="font-size:28px">Áreas de atuação</span></div>
  <div class="line"><span class="spec">H3 · 26–34</span><span class="samp" style="font-size:22px">Consultoria preventiva</span></div>
  <div class="line"><span class="spec">H4 · 21–24</span><span class="samp" style="font-size:18px">Contencioso estratégico</span></div>
</body>
</html>
