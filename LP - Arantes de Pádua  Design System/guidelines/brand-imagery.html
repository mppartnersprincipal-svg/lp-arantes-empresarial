<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--ivory); padding: 22px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1.3fr; gap: 14px; }
  figure { margin: 0; border-radius: var(--r-md); overflow: hidden; box-shadow: var(--shadow-sm); position: relative; height: 200px; }
  figure img { width: 100%; height: 100%; object-fit: cover; }
  .duo { object-position: center; }
  .tint { position: absolute; inset: 0; }
  .tint-em { background: linear-gradient(180deg, transparent 35%, rgba(7,33,27,.78) 100%); }
  .cap { position: absolute; left: 12px; bottom: 10px; font-family: var(--font-sans); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--platinum-100); }
  .note { font-family: var(--font-sans); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--text-faint); margin: 12px 2px 0; }
</style>
</head>
<body>
  <div class="grid">
    <figure><img src="../assets/partner-1.jpg" alt="Sócio"></figure>
    <figure><img src="../assets/partner-2.jpg" alt="Sócio"></figure>
    <figure><img class="duo" src="../assets/partners-duo.jpg" alt="Sócios"><div class="tint tint-em"></div><span class="cap">Emerald gradient overlay</span></figure>
  </div>
  <p class="note">Portraits: warm office light, suits, direct gaze. Overlay emerald gradient for text legibility.</p>
</body>
</html>
