<!-- @dsCard group="Spacing" viewport="700x200" name="Elevation" subtitle="Restrained on light; deep on emerald" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--sand-100); padding: 28px; }
  .meta { font-family: var(--font-sans); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--text-faint); margin: 0 0 22px; }
  .row { display: flex; gap: 26px; align-items: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box { width: 96px; height: 64px; background: var(--surface-paper); border-radius: var(--r-md); }
  .lab { font-family: var(--font-sans); font-size: 10px; color: var(--text-muted); letter-spacing: .05em; }
</style>
</head>
<body>
  <p class="meta">Elevation · --shadow-*</p>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="lab">xs</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="lab">sm</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="lab">md</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="lab">lg</span></div>
    <div class="item"><div class="box" style="background:var(--surface-brand);box-shadow:var(--shadow-card-dark)"></div><span class="lab">card-dark</span></div>
  </div>
</body>
</html>
