<!-- @dsCard group="Colors" viewport="700x190" name="Neutrals — ivory, sand & ink" subtitle="Warm light surfaces + green-tinted charcoals for text" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--ivory); padding: 22px; }
  .cap { font-family: var(--font-sans); font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--text-muted); margin: 0 0 12px; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .group { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border-radius: var(--r-md); overflow: hidden; box-shadow: var(--shadow-sm); border: 1px solid var(--hairline-on-light); }
  .sw { aspect-ratio: 1 / 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 7px; }
  .sw span { font-family: var(--font-sans); font-size: 9px; letter-spacing: .03em; }
  .sw .hex { font-size: 8px; opacity: .7; }
  .lo { color: var(--ink-700); } .hi { color: var(--platinum-100); }
  .lbl { font-family: var(--font-sans); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-faint); margin: 0 0 6px; }
</style>
</head>
<body>
  <p class="cap">Neutrals</p>
  <div class="grid">
    <div>
      <p class="lbl">Paper / Sand</p>
      <div class="group">
        <div class="sw lo" style="background:#ffffff"><span>paper</span><span class="hex">FFFFFF</span></div>
        <div class="sw lo" style="background:#faf9f4"><span>ivory</span><span class="hex">FAF9F4</span></div>
        <div class="sw lo" style="background:#f2efe7"><span>sand 100</span><span class="hex">F2EFE7</span></div>
        <div class="sw lo" style="background:#e7e2d6"><span>sand 200</span><span class="hex">E7E2D6</span></div>
      </div>
    </div>
    <div>
      <p class="lbl">Ink (text)</p>
      <div class="group">
        <div class="sw hi" style="background:#13201c"><span>900</span><span class="hex">13201C</span></div>
        <div class="sw hi" style="background:#2d3a35"><span>700</span><span class="hex">2D3A35</span></div>
        <div class="sw hi" style="background:#5d6862"><span>500</span><span class="hex">5D6862</span></div>
        <div class="sw lo" style="background:#a7aea9"><span>300</span><span class="hex">A7AEA9</span></div>
      </div>
    </div>
  </div>
</body>
</html>
