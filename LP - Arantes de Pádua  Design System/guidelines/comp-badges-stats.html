<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="../components.css">
<style>
  body { margin: 0; background: var(--ivory); padding: 30px; display: flex; flex-direction: column; gap: 26px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .stats { display: flex; gap: 50px; }
</style>
</head>
<body>
  <div class="row">
    <span class="badge">Direito empresarial</span>
    <span class="badge">Desde 2009</span>
    <span class="badge">Contencioso</span>
  </div>
  <hr class="metal-rule">
  <div class="stats">
    <div class="stat"><span class="num">15+</span><span class="lbl">Anos de atuação</span></div>
    <div class="stat"><span class="num">480</span><span class="lbl">Casos conduzidos</span></div>
    <div class="stat"><span class="num">98%</span><span class="lbl">Clientes recorrentes</span></div>
  </div>
</body>
</html>
