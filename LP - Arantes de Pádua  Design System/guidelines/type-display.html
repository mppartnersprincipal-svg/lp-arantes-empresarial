<!-- @dsCard group="Type" viewport="700x260" name="Display — Cormorant Garamond" subtitle="Editorial serif for headlines · authority & refinement" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--ivory); padding: 28px 30px; }
  .meta { font-family: var(--font-sans); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--text-faint); margin: 0 0 14px; display: flex; gap: 18px; flex-wrap: wrap; }
  .big { font-family: var(--font-display); font-weight: 600; font-size: 74px; line-height: .98; letter-spacing: -.015em; color: var(--text-strong); margin: 0; }
  .big em { font-style: italic; font-weight: 500; color: var(--emerald-600); }
  .scale { margin-top: 18px; display: flex; flex-direction: column; gap: 6px; }
  .scale div { font-family: var(--font-display); color: var(--text-body); line-height: 1.1; }
  .s1 { font-size: 40px; font-weight: 600; }
  .s2 { font-size: 30px; font-weight: 500; }
  .s3 { font-size: 22px; font-weight: 500; }
  .tag { font-family: var(--font-sans); font-size: 10px; letter-spacing: .1em; color: var(--text-faint); }
</style>
</head>
<body>
  <p class="meta"><span>Cormorant Garamond</span><span>400 · 500 · 600 · 700 + italic</span></p>
  <p class="big">Justiça <em>conduzida</em> com precisão</p>
  <div class="scale">
    <div class="s1">H1 — Direito empresarial <span class="tag">/ 600</span></div>
    <div class="s2">H2 — Estratégia jurídica <span class="tag">/ 500</span></div>
    <div class="s3">H3 — Consultoria e contencioso <span class="tag">/ 500</span></div>
  </div>
</body>
</html>
