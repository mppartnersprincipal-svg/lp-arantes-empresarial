<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Arantes de Pádua · Advogados</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html { scroll-behavior: smooth; }
  body { background: var(--surface-light); }
  a { -webkit-tap-highlight-color: transparent; }

  @media (max-width: 1024px) {
    .desktop-nav { display: none !important; }
    .mobile-toggle { display: inline-flex !important; }
    .hero-grid { grid-template-columns: 1fr !important; gap: 48px !important; }
    .hero-photo { order: -1; }
    .stats-grid { grid-template-columns: 1fr 1fr !important; gap: 28px 32px !important; }
    .stats-grid > div { border-left: none !important; padding-left: 0 !important; }
    .practice-grid { grid-template-columns: 1fr !important; }
    .about-grid { grid-template-columns: 1fr !important; gap: 40px !important; }
    .about-photo { max-width: 420px; }
    .values-grid { grid-template-columns: 1fr !important; }
    .partners-grid { grid-template-columns: 1fr !important; max-width: 420px !important; }
    .process-grid { grid-template-columns: 1fr 1fr !important; gap: 32px !important; }
    .quotes-grid { grid-template-columns: 1fr !important; }
    .contact-grid { grid-template-columns: 1fr !important; gap: 44px !important; }
    .footer-grid { grid-template-columns: 1fr !important; gap: 36px !important; }
  }
  @media (max-width: 520px) {
    .stats-grid { grid-template-columns: 1fr !important; }
    .process-grid { grid-template-columns: 1fr !important; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="sections-top.jsx"></script>
  <script type="text/babel" src="sections-bottom.jsx"></script>
  <script type="text/babel">
    const { useEffect } = React;
    function App() {
      const onNavClick = (e, id) => {
        e.preventDefault();
        const el = document.getElementById(id);
        if (el) {
          const y = el.getBoundingClientRect().top + window.scrollY - (id === "top" ? 0 : 64);
          window.scrollTo({ top: Math.max(0, y), behavior: "smooth" });
        }
      };
      useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
      return (
        <React.Fragment>
          <Nav onNavClick={onNavClick} />
          <main>
            <Hero onNavClick={onNavClick} />
            <StatsBar />
            <Practices />
            <About />
            <Partners />
            <Process />
            <Testimonials />
            <Contact />
          </main>
          <Footer onNavClick={onNavClick} />
        </React.Fragment>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
